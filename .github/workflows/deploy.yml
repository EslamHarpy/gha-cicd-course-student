name: Deploy Workflow

on:
  push:
    branches: [main]

env:
  ECR_REPOSITORY: "iti-actions-assessment"
  CONTAINER_NAME: "tiny-health-container"
  APP_PORT: "8000"
  STATIC_TAG: "latest_1" 
jobs:
  deploy-package:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Amazon ECR inside VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Pull Docker image from ECR inside VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.STATIC_TAG }}"
            docker pull $IMAGE_URI

      - name: Start container inside VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.STATIC_TAG }}"
            docker rm -f ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              -p "${{ env.APP_PORT }}:8000" \
              $IMAGE_URI

      - name: Smoke test deployed app inside VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent "http://127.0.0.1:${{ env.APP_PORT }}/health" > /dev/null; then
                exit 0
              fi
              sleep 2
            done
            exit 1

      - name: Show container running inside VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker ps --filter "name=${{ env.CONTAINER_NAME }}"

      - name: Stop container (Optional Clean up)
        if: failure() # Stop container if smoke test failed
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker rm -f "${{ env.CONTAINER_NAME }}" || true